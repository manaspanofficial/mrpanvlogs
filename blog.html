<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog | Mr Pan Vlogs</title>
  <meta name="description" content="Mr Pan Vlogs-এর Travel Diary ও Blog পড়ুন।" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar scrolled" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <img src="avatar.png.png" alt="Mr Pan" class="logo-avatar" />
        <span class="logo-text">Mr Pan <span class="accent">Vlogs</span></span>
      </a>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="about.html" class="nav-link">About</a></li>
        <li><a href="videos.html" class="nav-link">Videos</a></li>
        <li><a href="blog.html" class="nav-link active">Blog</a></li>
        <li><a href="contact.html" class="nav-link">Contact</a></li>
      </ul>
      <a href="https://www.youtube.com/@MrPanVlogs" target="_blank" class="btn btn-primary nav-cta" id="subscribe-btn">
        <i class="fab fa-youtube"></i> Subscribe
      </a>
      <button class="hamburger" id="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- PAGE HERO -->
  <div class="page-hero">
    <div class="page-hero-bg">
      <div class="hero-orb orb1"></div>
      <div class="hero-orb orb2"></div>
      <div class="hero-grid"></div>
    </div>
    <div class="page-hero-content">

      <h1 class="page-hero-title">Travel <span class="gradient-text">Diary</span></h1>
      <p class="page-hero-sub">আমার ভ্রমণের অভিজ্ঞতা ও গল্পগুলো</p>
    </div>
  </div>

  <!-- BLOG SECTION -->
  <section class="section blog-section" id="blog">
    <div class="container">
      <div class="blog-grid" id="dynamic-blogs-grid">
        <!-- Blogs will be injected here by public.js -->
        <p style="color: var(--text-muted); text-align: center; grid-column: 1 / -1;">Loading blogs...</p>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-glow"></div>
    <div class="container">
      <div class="footer-top">
        <div class="footer-brand">
          <a href="index.html" class="nav-logo">
            <img src="avatar.png.png" alt="Mr Pan" class="logo-avatar" />
            <span class="logo-text">Mr Pan <span class="accent">Vlogs</span></span>
          </a>
          <p class="footer-tagline">ভ্রমণ করি · গল্প বলি · ভিডিও বানাই</p>
          <div class="footer-socials">
            <a href="https://www.youtube.com/@MrPanVlogs" target="_blank" class="social-link youtube" aria-label="YouTube"><i class="fab fa-youtube"></i></a>
            <a href="https://www.instagram.com/mrpanvlogs" target="_blank" class="social-link instagram" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
            <a href="https://www.facebook.com/profile.php?id=61591458968268" target="_blank" class="social-link facebook" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
          </div>
        </div>

      </div>
      <div class="footer-bottom">
        <p>© 2025 Mr Pan Vlogs. All Rights Reserved. Made with ❤️ in West Bengal, India 🇮🇳 | জয় মা দুর্গা 🛕</p>
      </div>
    </div>
  </footer>

  <!-- Firebase Scripts (Compat v8) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="public.js"></script>
  <script src="script.js"></script>
</body>
</html>
